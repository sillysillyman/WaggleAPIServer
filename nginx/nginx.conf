events {
    worker_connections 1024;
}

http {
    upstream spring-app {
        server app:8080;
    }

    # HTTP -> HTTPS л¶ђлЛ§мЭіл†ЙнКЄ
    server {
        listen 80;
        server_name api.waggle.lol;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # fail2banмЭі мґФм†БнХ† мИШ мЮИлПДл°Э imageмЭШ stdout/stderr symlink мЪ∞нЪМ.
    # кЄ∞л≥Є access.log/error.logлКФ /dev/stdout, /dev/stderrл°Ь symlinkлРШмЦі мЮИмЦі
    # docker volumeмЧР кЈЄлМАл°Ь л∞ХнЮИл©і fail2ban мї®нЕМмЭілДИмЧРмДЬ лФ∞лЭЉк∞И лХМ мЮРкЄ∞ stdoutмЬЉл°Ь лє†мІР.
    access_log /var/log/nginx/api-access.log;
    error_log /var/log/nginx/api-error.log;

    # HTTPS
    server {
        listen 443 ssl;
        server_name api.waggle.lol;

        ssl_certificate /etc/letsencrypt/live/api.waggle.lol/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.waggle.lol/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;

        client_max_body_size 10M;

        # Swagger UI/api-docsлКФ default-src 'none' CSP мХДлЮШмЧРмД† лПЩмЮС лґИк∞АнХШлѓАл°Ь
        # мЭі лСР locationмЧРмДЬлІМ CSPл•Љ мЩДнЩФнХЬлЛ§.
        # nginx add_headerлКФ нХШмЬД мї®нЕНмК§нКЄмЧР нХШлВШлЭЉлПД мД†мЦЄнХШл©і мГБмЬДк∞А л™®лСР лђімЛЬлРШлѓАл°Ь
        # лЛ§л•Є л≥імХИ нЧ§лНФлПД л™®лСР мЮђмД†мЦЄнХімХЉ нХЬлЛ§.
        location /swagger-ui/ {
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;

            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cross-Origin-Resource-Policy "same-site" always;

            proxy_pass http://spring-app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /v3/api-docs {
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;

            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cross-Origin-Resource-Policy "same-site" always;

            proxy_pass http://spring-app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://spring-app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # WebSocket idle мЧ∞к≤∞ мЬ†мІА: Spring STOMP heartbeat(10s) + мЧђмЬ† лІИмІД
            proxy_read_timeout 75s;
            proxy_send_timeout 75s;
        }

        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}
