events {
    worker_connections 1024;
}

http {
    upstream spring-app {
        server app:8080;
    }

    # HTTP -> HTTPS 리다이렉트
    server {
        listen 80;
        server_name api.waggle.lol;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # fail2ban이 추적할 수 있도록 image의 stdout/stderr symlink 우회.
    # 기본 access.log/error.log는 /dev/stdout, /dev/stderr로 symlink되어 있어
    # docker volume에 그대로 박히면 fail2ban 컨테이너에서 따라갈 때 자기 stdout으로 빠짐.
    access_log /var/log/nginx/api-access.log;
    error_log /var/log/nginx/api-error.log;

    # HTTPS
    server {
        listen 443 ssl;
        server_name api.waggle.lol;

        ssl_certificate /etc/letsencrypt/live/api.waggle.lol/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.waggle.lol/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;

        client_max_body_size 10M;

        # Swagger UI/api-docs는 default-src 'none' CSP 아래에선 동작 불가하므로
        # 이 두 location에서만 CSP를 완화한다.
        # nginx add_header는 하위 컨텍스트에 하나라도 선언하면 상위가 모두 무시되므로
        # 다른 보안 헤더도 모두 재선언해야 한다.
        location /swagger-ui/ {
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;

            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cross-Origin-Resource-Policy "same-site" always;

            proxy_pass http://spring-app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /v3/api-docs {
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;

            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cross-Origin-Resource-Policy "same-site" always;

            proxy_pass http://spring-app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://spring-app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}
