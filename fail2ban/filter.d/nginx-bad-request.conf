[Definition]
# 일반적인 정찰/공격 패턴만 ban — 정상 사용자의 404/403 트리거 방지
# path 뒤 ` .*`는 query/sub-path를 강제로 요구하므로 `/wp-admin HTTP/1.1`처럼 path 직후 공백 하나만 있는 흔한 케이스가 매칭되지 않음. \S*로 path 끝을 한정해 두 경우 모두 잡음
failregex = ^<HOST> -.* "(GET|POST|HEAD) /(wp-admin|wp-login|wp-content|wordpress|\.env|\.git|\.aws|\.ssh|phpmyadmin|pma|adminer|admin\.php|xmlrpc\.php|cgi-bin|setup\.php|owa)\S* HTTP/[\d.]+" \d+ .*$
            ^<HOST> -.* "[A-Z]+ /\S*\.(php|asp|aspx|jsp|cgi|env|sql|bak|backup|old)\S* HTTP/[\d.]+" \d+ .*$
            ^<HOST> -.* "[A-Z]+ .+" 444 .*$
ignoreregex =
